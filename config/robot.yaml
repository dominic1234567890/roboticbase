robot:
  name: trashcan-mini-pi5-robot
  drive_type: differential_2wd_front_caster
  wheel_track_m: 0.1143      # 4.5 inches between wheel centers
  wheel_radius_m: 0.0325     # TODO: measure your actual wheel radius; 65 mm diameter is common for TT wheels
  cog_from_axle_m: null      # TODO: user will provide later

lidar:
  model: LD20
  port: /dev/ttyUSB0
  baud: 230400               # common LD20 default; if no packets, try 115200 and check docs/adapter
  frame_header: 0x54
  frame_ver_len: 0x2c
  points_per_packet: 12
  mount_yaw_offset_deg: 1.0  # adjust after you know which physical direction is robot-front
  min_distance_m: 0.08
  max_distance_m: 8.0
  min_confidence: 0

camera:
  model: Logitech C920
  index: 0
  width: 640
  height: 480
  fps: 30
  horizontal_fov_deg: 70.0   # rough starter; calibrate later
  mount_yaw_offset_deg: 0.0
  mount_pitch_deg: 0.0

fusion_hat:
  # Single source of truth for motor wiring. Scripts may override these from the CLI,
  # but their defaults come from this section.
  motor_left_port: M3
  motor_right_port: M2
  left_reversed: false       # flip this after a propped-up tiny pulse test if needed
  right_reversed: false      # flip this after a propped-up tiny pulse test if needed
  max_test_power_percent: 20

encoders:
  # Current swapped encoder wiring after the first hardware test
  left_channel_a: 27
  left_channel_b: 17
  right_channel_a: 4
  right_channel_b: 22
  left_inverted: true
  right_inverted: false
  ticks_per_wheel_rev: 600    # TODO: measure this with scripts/odom0_watch_encoders.py

odometry:
  gyro_delta_weight: 0.0     # future IMU hook; keep 0 until gyro bias is calibrated
  absolute_heading_weight: 0.0

drive_forward_test:
  # Start in open-loop mode to measure drift, then try heading-pid if it curves.
  mode: open-loop
  power_percent: 12.0
  seconds: 1.0
  target_distance_m: 0.0      # 0 means stop by time only
  control_hz: 20.0
  print_hz: 5.0
  left_trim_percent: 0.0
  right_trim_percent: 0.0
  heading_kp: 0.45
  heading_ki: 0.0
  heading_kd: 0.0
  integral_limit_deg_s: 60.0
  max_turn_correction_percent: 8.0
  csv: data/captures/drive_forward_test.csv

safety:
  front_stop_distance_m: 0.35
  side_stop_distance_m: 0.20
  front_zone_half_angle_deg: 25
  side_zone_width_deg: 35
  front_gate_min_points: 900
  front_gate_test_power_percent: 12.0
  front_gate_test_seconds: 1.0
  front_gate_poll_s: 0.20

mapping:
  cell_size_m: 0.05
  size_m: 6.0
  edge_max_neighbor_gap_m: 0.18
  edge_max_line_error_m: 0.035
  edge_min_segment_points: 8
  edge_min_segment_length_m: 0.25
  two_scan_test_forward_m: 0.30
  # Point-cloud filters. Use null or 0 to disable a filter.
  filter_voxel_leaf_size_m: null       # try 0.03 to 0.06 m after raw scans look sane
  filter_sor_mean_k: 0                 # try 8 to 12
  filter_sor_std_ratio: 1.0
  filter_radius_outlier_radius_m: null # try 0.12 to 0.20 m
  filter_radius_outlier_min_neighbors: 0
  filter_passthrough_min_x_m: null
  filter_passthrough_max_x_m: null
  filter_passthrough_min_y_m: null
  filter_passthrough_max_y_m: null
  filter_passthrough_min_range_m: null
  filter_passthrough_max_range_m: null
  filter_passthrough_min_bearing_deg: null
  filter_passthrough_max_bearing_deg: null
